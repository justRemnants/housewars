<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Dodo{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f13; --surface: #161920; --surface2: #1e2229; --surface3: #252931;
            --border: #2a2e38; --accent: #5865f2; --accent-hover: #4752c4;
            --green: #57f287; --red: #ed4245; --yellow: #fee75c; --orange: #ff8c00;
            --text: #e3e5e8; --muted: #72767d; --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar - Fixed Width, No Tweaking */
        .sidebar {
            width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; height: 100%;
        }
        .sidebar-header {
            height: 80px; padding: 0 24px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header img { width: 32px; height: 32px; border-radius: 8px; }
        .sidebar-header h1 { font-size: 16px; font-weight: 700; }

        .nav-container { padding: 24px; display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }
        .nav-item { 
            display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            border-radius: 8px; color: var(--muted); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: all 0.15s;
        }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active { background: var(--accent); color: #fff; }

        /* Main Area */
        .main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; }
        .topbar {
            height: 80px; min-height: 80px; padding: 0 32px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; background: var(--surface);
        }
        .content { padding: 32px; overflow-y: auto; flex-grow: 1; }

        /* Sleek Color Pickers */
        input[type="color"] {
            -webkit-appearance: none; border: none; width: 28px; height: 28px;
            border-radius: 50%; cursor: pointer; background: transparent; padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 50%; }

        /* Standard Components */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
        .flex { display: flex; } .items-center { align-items: center; } .gap-8 { gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: 0.15s; font-size: 14px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: rgba(237, 66, 69, 0.1); color: var(--red); border-color: rgba(237, 66, 69, 0.2); }
        .btn-sm { padding: 6px 12px; font-size: 13px; }

        /* Toasts */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--surface3); border: 1px solid var(--border); padding: 12px 18px; border-radius: 10px; font-size: 14px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); padding: 24px; border-radius: 16px; width: 100%; max-width: 480px; border: 1px solid var(--border); }

        {% block head %}{% endblock %}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="/static/favicon.png" alt="Logo">
            <h1>Ice Dodo</h1>
        </div>
        <div class="nav-container">
            <nav class="nav-list">
                <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">🏠 Overview</a>
                <a href="/houses" class="nav-item {% if request.path == '/houses' %}active{% endif %}">🏰 Houses</a>
                <a href="/members" class="nav-item {% if request.path == '/members' %}active{% endif %}">👥 Members</a>
                <a href="/messages" class="nav-item {% if request.path == '/messages' %}active{% endif %}">✉️ Messages</a>
                <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">⚙️ Settings</a>
            </nav>
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
                <a href="/logout" class="nav-item" style="color: var(--red);">🚪 Logout</a>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div>
                <h2 style="font-size: 18px; font-weight: 700;">{% block page_title %}Dashboard{% endblock %}</h2>
                <p style="font-size: 13px; color: var(--muted);">{% block page_sub %}{% endblock %}</p>
            </div>
            <div class="flex gap-8 items-center">{% block topbar_actions %}{% endblock %}</div>
        </header>
        <div class="content">{% block content %}{% endblock %}</div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
    function toast(msg, type='success') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.innerHTML = msg;
        c.appendChild(t);
        setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(), 400); }, 3000);
    }
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    </script>
    <script src="//instant.page/5.2.0" type="module"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
