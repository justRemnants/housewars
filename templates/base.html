<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Dodo{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #0d0f13; --surface: #161920; --surface2: #1e2229; --surface3: #252931;
            --border: #2a2e38; --accent: #5865f2; --accent-hover: #4752c4;
            --green: #57f287; --red: #ed4245; --yellow: #fee75c; --orange: #ff8c00;
            --text: #e3e5e8; --muted: #72767d; --radius: 12px;
        }

        /* 1. Sleek Scrollbar (Grey, no track, inside modal) */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #3f444e;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4f545c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        .sidebar {
            width: 260px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; position: fixed; height: 100vh;
        }

        .sidebar-header {
            padding: 24px; display: flex; align-items: center; gap: 12px;
        }
        
        /* 3. Sleek Logo Divider */
        .sidebar-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 0 24px 16px 24px;
        }

        .nav { flex: 1; padding: 0 12px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            color: var(--muted); text-decoration: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; transition: all 0.2s; margin-bottom: 4px;
        }
        .nav-item:hover, .nav-item.active { background: var(--surface2); color: var(--text); }
        .nav-item i { font-size: 18px; }

        .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        /* 5. Aligned Divider for Header */
        .topbar {
            padding: 24px 32px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); position: sticky; top: 0; z-index: 10;
        }

        .content { padding: 32px; max-width: 1200px; }

        /* 6. Nicer Color Picker */
        input[type="color"] {
            -webkit-appearance: none; border: none; width: 40px; height: 40px;
            border-radius: 8px; cursor: pointer; background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 8px; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.2s; z-index: 100;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; width: 100%; max-width: 500px;
            max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-content { 
            padding: 24px; overflow-y: auto; 
            /* Ensuring scrollbar is tight to the edge */
            padding-right: 12px;
        }
    </style>
</head>
<body hx-boost="true"> <aside class="sidebar">
        <div class="sidebar-header">
            <img src="/static/favicon.png" style="width:32px;border-radius:8px">
            <h2 style="font-size:18px">Ice Dodo</h2>
        </div>
        <div class="sidebar-divider"></div>
        <nav class="nav">
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">Overview</a>
            <a href="/houses" class="nav-item {% if request.path == '/houses' %}active{% endif %}">Houses</a>
            <a href="/members" class="nav-item {% if request.path == '/members' %}active{% endif %}">Members</a>
            <a href="/messages" class="nav-item {% if request.path == '/messages' %}active{% endif %}">Messages</a>
            <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">Settings</a>
        </nav>
        <div class="sidebar-footer" style="padding: 16px; border-top: 1px solid var(--border)">
            <a href="/logout" class="nav-item" style="color: var(--red)">Logout</a>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h2 style="font-weight: 700;">{% block page_title %}Dashboard{% endblock %}</h2>
                <p style="color: var(--muted); font-size: 14px;">{% block page_sub %}{% endblock %}</p>
            </div>
            <div class="flex gap-8 items-center">{% block topbar_actions %}{% endblock %}</div>
        </div>
        <div class="content">{% block content %}{% endblock %}</div>
    </main>

    <div class="toast-container" id="toastContainer"></div>
    <script>
    function toast(msg, type='success') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span> ${msg}`;
        c.appendChild(t);
        setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(16px)'; t.style.transition='all 0.2s'; setTimeout(()=>t.remove(),200); }, 3200);
    }
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    </script>
</body>
</html>
