<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Dodo Dashboard — Login</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f13; --surface: #161920; --surface2: #1e2229;
            --border: #2a2e38; --accent: #5865f2; --text: #e3e5e8;
            --muted: #72767d; --red: #ed4245;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        .login-icon {
            font-size: 40px;
            text-align: center;
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; font-weight: 700; text-align: center; }
        .sub { font-size: 13px; color: var(--muted); text-align: center; margin-top: 4px; margin-bottom: 28px; }
        label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
        input {
            width: 100%; padding: 11px 14px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 14px;
            font-family: inherit; outline: none; transition: border-color 0.15s;
        }
        input:focus { border-color: var(--accent); }
        .btn {
            width: 100%; padding: 11px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600;
            font-family: inherit; cursor: pointer;
            margin-top: 16px; transition: background 0.15s;
        }
        .btn:hover { background: #4752c4; }
        .error {
            background: rgba(237,66,69,0.12);
            border: 1px solid rgba(237,66,69,0.3);
            color: var(--red);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon"><img src="/static/favicon.png" alt="Logo" style="width:56px;height:56px;border-radius:12px;object-fit:cover"></div>
        <h1>Ice Dodo Dashboard</h1>
        <p class="sub">Enter your password to continue</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div style="margin-bottom:16px">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" autofocus required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>
</body>
</html>
